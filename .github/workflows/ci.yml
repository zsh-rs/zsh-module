name: CI

on:
  push:
    paths-ignore:
      - README.md
      - release.toml
      - CHANGELOG.md
      - docs/**
    branches: [ "main" ]
  pull_request:
    paths-ignore:
      - README.md
      - release.toml
      - CHANGELOG.md
      - docs/**
    branches: [ "main" ]

jobs:
  ci:
    name: ${{ matrix.os.display }} / ${{ matrix.cargo_flags.display }}
    runs-on: ${{ matrix.os.value }}-latest
    strategy:
      matrix:
        os:
          - { value: ubuntu, display: linux }
          - { value: macOS, display: macos }
        cargo_flags: [no-default-features, all-features ]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install ZSH
        if: runner.os == 'Linux'
        run: sudo apt-get install zsh
         
      - name: ⚡ Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: |
            ~/.cache/zsh-src
            ~/Library/Caches/dev.zsh-rs.zsh-src
            tests/fixtures/test-fixture/target

      - name: 🔨 Build
        run: cargo build --all --${{ matrix.cargo_flags }}
        
      - name: 🧪 Test
        run: cargo test --all --${{ matrix.cargo_flags }}

      - name: 📋 Upload fixture build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os.display }}-${{matrix.cargo_flags}}-fixture-build-log
          path: tests/fixtures/test-fixture/target/debug/logs/build.log

        